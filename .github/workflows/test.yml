name: test-workflow
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v3
      - name: Install Node js
        uses: actions/setup-node
        with: 
          node version: 18
      - name: Install Dependencies
        run: npm ci
      - name : Run test
        run: npm run test
